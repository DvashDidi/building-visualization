<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>חדר עבודה — מודל תלת־ממד (אופציות A / B)</title>
<style>
  :root{--brass:#b08d57}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#171412;color:#efe8dc;
    font-family:"Assistant","Segoe UI",system-ui,Arial,sans-serif;overflow:hidden}
  #app{position:fixed;inset:0}
  canvas{display:block}
  .bar{position:fixed;top:0;right:0;left:0;display:flex;gap:.5rem;align-items:center;
    flex-wrap:wrap;padding:.55rem .8rem;z-index:10;
    background:linear-gradient(#171412ee,#17141200);pointer-events:none}
  .bar>*{pointer-events:auto}
  .title{font-weight:700;color:#f4efe7;font-size:.95rem;margin-inline-end:auto}
  .title small{display:block;font-weight:400;color:#c7bdae;font-size:.72rem;margin-top:2px}
  .opt{display:flex;gap:.3rem;background:#221e1a;border:1px solid #4a423a;border-radius:999px;padding:.2rem}
  button.o{border:0;background:transparent;color:#efe8dc;border-radius:999px;
    padding:.4rem .95rem;font-size:.85rem;cursor:pointer;font-family:inherit;font-weight:600}
  button.o.on{background:var(--brass);color:#1c1712}
  .views{display:flex;gap:.32rem;flex-wrap:wrap}
  button.v{border:1px solid #4a423a;background:#221e1a;color:#efe8dc;border-radius:999px;
    padding:.4rem .75rem;font-size:.8rem;cursor:pointer;font-family:inherit}
  button.v:hover{border-color:var(--brass)}
  button.v.on{background:var(--brass);border-color:var(--brass);color:#1c1712;font-weight:600}
  .tools{display:flex;gap:.32rem}
  button.t{border:1px solid #4a423a;background:#221e1a;color:#efe8dc;border-radius:8px;
    padding:.4rem .65rem;font-size:.8rem;cursor:pointer;font-family:inherit}
  button.t:hover{border-color:var(--brass)}
  button.t.on{background:var(--brass);border-color:var(--brass);color:#1c1712}
  .hint{position:fixed;bottom:.7rem;right:.8rem;z-index:10;color:#d9d0c2;font-size:.74rem;
    background:#1c191699;border:1px solid #3a332c;border-radius:8px;padding:.4rem .6rem}
  .legend{position:fixed;bottom:.7rem;left:.8rem;z-index:10;color:#e7ded0;font-size:.73rem;
    background:#1c191699;border:1px solid #3a332c;border-radius:10px;padding:.5rem .65rem;max-width:min(48ch,62vw)}
  #loading{position:fixed;inset:0;display:grid;place-items:center;color:#e8dfd0;background:#171412;z-index:20}
  .hud{position:fixed;top:3.4rem;left:.8rem;z-index:11;background:#1c1916f2;border:1px solid #4a423a;border-radius:10px;padding:.55rem .7rem;color:#e7ded0;direction:ltr;text-align:left;max-width:min(64ch,72vw)}
  .hud .row{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.72rem;white-space:pre-wrap;line-height:1.55;color:#f0e9db}
  .hud button{margin-top:.45rem;border:1px solid #4a423a;background:#221e1a;color:#efe8dc;border-radius:7px;padding:.32rem .65rem;font-size:.72rem;cursor:pointer;font-family:inherit}
  .hud button:hover{border-color:var(--brass)}
  .refpanel{position:fixed;right:.8rem;bottom:3.2rem;z-index:12;width:210px;background:#1c1916f2;border:1px solid #4a423a;border-radius:12px;padding:.5rem;display:none}
  .refpanel.show{display:block}
  .refpanel .cap{font-size:.72rem;color:#e7ded0;margin-bottom:.35rem;display:flex;justify-content:space-between;align-items:center;gap:.4rem}
  .refpanel img{width:100%;border-radius:8px;display:block;cursor:zoom-in;border:1px solid #3a332c}
  .refpanel .x{cursor:pointer;color:#c7bdae;border:0;background:transparent;font-size:.85rem;line-height:1}
  .refmodal{position:fixed;inset:0;z-index:30;background:#0b0908ee;display:none;align-items:center;justify-content:center;padding:1.4rem;cursor:zoom-out}
  .refmodal.show{display:flex}
  .refmodal img{max-width:96vw;max-height:92vh;border-radius:10px;box-shadow:0 12px 44px #000a}
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">טוען את המודל…</div>

<div class="bar">
  <div class="title">חדר עבודה · מודל תלת־ממד <small id="sub">3.33 × 2.89 מ׳ · כיוון עיצובי למעצבת</small></div>
  <div class="opt" id="opts">
    <button class="o on" data-opt="A">אופציה A</button>
    <button class="o" data-opt="B">אופציה B</button>
    <button class="o" data-opt="C">אופציה C</button>
    <button class="o" data-opt="D">אופציה D</button>
  </div>
  <div class="views" id="views"></div>
  <div class="tools">
    <button class="t" id="measure">📏 מדידה</button>
    <button class="t" id="dims">מידות</button>
    <button class="t" id="spin">סיבוב אוטומטי</button>
    <button class="t" id="shot">⬇︎ שמירת תמונה</button>
  </div>
</div>

<div class="legend" id="legend"></div>
<div class="hint">גרירה = סיבוב · Shift+גרירה או קליק-ימני = הזזה · גלגלת = זום</div>
<div class="refpanel" id="refpanel">
  <div class="cap"><span id="refcap">📷 רפרנס</span></div>
  <img id="refthumb" alt="reference"/>
</div>
<div class="refmodal" id="refmodal"><img id="refbig" alt="reference"/></div>

<script>
(function(){
"use strict";
const TH=THREE;

// ===== ROOM =====
const RW=3.33, RD=2.89, RH=2.6;
const Z = y => RD - y;              // plan-y (0=bottom..RD=top) -> 3D z (0=near/door, RD=far)
function entryDoor(opt){ return opt==='A'?{x0:0.45,x1:1.25} : opt==='D'?{x0:0.65,x1:1.45} : {x0:0.55,x1:1.35}; }
const BALC = {z0:Z(0.60), z1:Z(0.0)};   // left wall balcony, z 2.29..2.89
const DOOR_H=2.05, BALC_H=2.10;
function cabDepth(opt){ return opt==='A'?0.45:0.50; }
const DESK_H=0.74, DESK_T=0.05;

// ===== RENDERER / SCENE / CAMERAS =====
const app=document.getElementById('app');
const renderer=new TH.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=TH.PCFSoftShadowMap;
renderer.outputEncoding=TH.sRGBEncoding; renderer.toneMapping=TH.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.03; app.appendChild(renderer.domElement);

const scene=new TH.Scene(); scene.background=new TH.Color('#c9d3d9');
const camera=new TH.PerspectiveCamera(52, innerWidth/innerHeight, 0.05, 100);
const orthoCam=new TH.OrthographicCamera(-3,3,3,-3,0.1,40);
orthoCam.position.set(RW/2,10,RD/2); orthoCam.up.set(0,0,-1); orthoCam.lookAt(RW/2,0,RD/2);

// ===== LIGHTS =====
scene.add(new TH.HemisphereLight(0xf3ede0,0x6b6152,0.65));
scene.add(new TH.AmbientLight(0xffffff,0.16));
const sun=new TH.DirectionalLight(0xffe9c6,1.35);
sun.position.set(-3.2,2.6,RD-0.3); sun.target.position.set(1.5,0.3,RD-0.7);
sun.castShadow=true; sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.1; sun.shadow.camera.far=13;
sun.shadow.camera.left=-4.5; sun.shadow.camera.right=4.5; sun.shadow.camera.top=4.5; sun.shadow.camera.bottom=-4.5;
sun.shadow.bias=-0.0004; sun.shadow.normalBias=0.02; scene.add(sun); scene.add(sun.target);
const fill=new TH.PointLight(0xfff2df,0.32,12,2); fill.position.set(1.6,RH-0.2,1.4); scene.add(fill);

// ===== TEXTURES =====
function woodFloorTexture(){
  const c=document.createElement('canvas');c.width=1024;c.height=1024;const g=c.getContext('2d');
  g.fillStyle='#b78a5b';g.fillRect(0,0,1024,1024);const ph=128;
  for(let r=0;r*ph<1024;r++){const off=(r%2)?170:0;
    for(let x=-off;x<1024;x+=256){const b=[181,138,91],v=(Math.random()*22-11);
      g.fillStyle='rgb('+((b[0]+v)|0)+','+((b[1]+v*0.8)|0)+','+((b[2]+v*0.6)|0)+')';
      g.fillRect(x+2,r*ph+2,252,ph-4);
      g.strokeStyle='rgba(90,62,35,0.10)';g.lineWidth=1;
      for(let k=0;k<10;k++){g.beginPath();const yy=r*ph+8+Math.random()*(ph-16);
        g.moveTo(x+4,yy);g.bezierCurveTo(x+80,yy+(Math.random()*6-3),x+170,yy+(Math.random()*6-3),x+250,yy);g.stroke();}}}
  const t=new TH.CanvasTexture(c);t.wrapS=t.wrapT=TH.RepeatWrapping;t.repeat.set(2.2,2.0);t.anisotropy=8;t.encoding=TH.sRGBEncoding;return t;
}
function wallTexture(hex){
  const c=document.createElement('canvas');c.width=256;c.height=256;const g=c.getContext('2d');
  g.fillStyle=hex;g.fillRect(0,0,256,256);
  for(let i=0;i<9000;i++){g.fillStyle='rgba(0,0,0,'+(Math.random()*0.02)+')';g.fillRect(Math.random()*256,Math.random()*256,1,1);}
  const t=new TH.CanvasTexture(c);t.wrapS=t.wrapT=TH.RepeatWrapping;t.repeat.set(3,3);t.encoding=TH.sRGBEncoding;return t;
}
const floorTex=woodFloorTexture(), wallTex=wallTexture('#efeae2');

// ===== MATERIALS =====
const M={
  floor:new TH.MeshStandardMaterial({map:floorTex,roughness:0.72,metalness:0.02}),
  wall:new TH.MeshStandardMaterial({map:wallTex,roughness:0.96,side:TH.FrontSide}),
  ceil:new TH.MeshStandardMaterial({color:'#f6f3ee',roughness:1,side:TH.FrontSide}),
  cab:new TH.MeshStandardMaterial({color:'#ece7df',roughness:0.5,metalness:0.03}),
  cabIn:new TH.MeshStandardMaterial({color:'#c7a06a',roughness:0.7}),
  reveal:new TH.MeshStandardMaterial({color:'#c9c1b4',roughness:0.8}),
  walnut:new TH.MeshStandardMaterial({color:'#6b4a2f',roughness:0.45,metalness:0.05}),
  walnutTop:new TH.MeshStandardMaterial({color:'#734f31',roughness:0.35,metalness:0.05}),
  metalDark:new TH.MeshStandardMaterial({color:'#2f3236',roughness:0.5,metalness:0.5}),
  screen:new TH.MeshStandardMaterial({color:'#0d0f12',roughness:0.45,metalness:0.0,emissive:0x1b2a44,emissiveIntensity:0.4}),
  printer:new TH.MeshStandardMaterial({color:'#3a3d42',roughness:0.55,metalness:0.3}),
  sage:new TH.MeshStandardMaterial({color:'#8ea67f',roughness:0.9}),
  sageC:new TH.MeshStandardMaterial({color:'#a1b795',roughness:0.9}),
  boucle:new TH.MeshStandardMaterial({color:'#e9e1d3',roughness:1.0,metalness:0.0}),
  boucle2:new TH.MeshStandardMaterial({color:'#ded4c3',roughness:1.0,metalness:0.0}),
  marble:new TH.MeshStandardMaterial({color:'#ece9e3',roughness:0.35,metalness:0.05}),
  brass:new TH.MeshStandardMaterial({color:'#b08d57',roughness:0.35,metalness:0.75}),
  rug:new TH.MeshStandardMaterial({color:'#cbb7a2',roughness:1}),
  rug2:new TH.MeshStandardMaterial({color:'#b8a189',roughness:1}),
  glass:new TH.MeshStandardMaterial({color:'#cfe3e6',roughness:0.08,transparent:true,opacity:0.28}),
  doorW:new TH.MeshStandardMaterial({color:'#e7e0d5',roughness:0.6}),
  frame:new TH.MeshStandardMaterial({color:'#8f8577',roughness:0.7}),
  fabric:new TH.MeshStandardMaterial({color:'#3a3d42',roughness:0.85}),
  plantPot:new TH.MeshStandardMaterial({color:'#b9743f',roughness:0.8}),
  leaf:new TH.MeshStandardMaterial({color:'#547a44',roughness:0.85}),
  book:new TH.MeshStandardMaterial({color:'#8a5a3a',roughness:0.8}),
  paper:new TH.MeshStandardMaterial({color:'#efe7d8',roughness:0.9}),
};

// ===== HELPERS =====
function box(w,h,d,mat,x,y,z,parent){
  const m=new TH.Mesh(new TH.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;(parent||scene).add(m);return m;
}
function plane(w,h,mat){const m=new TH.Mesh(new TH.PlaneGeometry(w,h),mat);m.receiveShadow=true;return m;}

// ===== WORLD =====
let world=new TH.Group(); scene.add(world);

function buildShell(opt,W_){
  let f=plane(RW,RD,M.floor); f.rotation.x=-Math.PI/2; f.position.set(RW/2,0,RD/2); W_.add(f);
  let c=plane(RW,RD,M.ceil); c.rotation.x=Math.PI/2; c.position.set(RW/2,RH,RD/2); W_.add(c);
  const wp=(w,h,cx,cy,cz,rotY)=>{const p=plane(w,h,M.wall);p.position.set(cx,cy,cz);p.rotation.y=rotY;W_.add(p);};
  const ed=entryDoor(opt);
  wp(RD,RH,RW,RH/2,RD/2,-Math.PI/2);                               // RIGHT wall
  wp(RW,RH,RW/2,RH/2,RD,Math.PI);                                  // FAR wall (solid)
  wp(ed.x0,RH,ed.x0/2,RH/2,0,0);                                   // NEAR wall left of door
  wp(RW-ed.x1,RH,(ed.x1+RW)/2,RH/2,0,0);                           // NEAR wall right of door

function meetingNook(cx,cz,off,axis,W_){
  const rw = axis==='z'?1.5:1.9, rd = axis==='z'?1.9:1.5;
  let rug=plane(rw,rd,M.rug); rug.rotation.x=-Math.PI/2; rug.position.set(cx,0.012,cz); W_.add(rug);
  let rl=plane(rw-0.16,rd-0.16,M.rug2); rl.rotation.x=-Math.PI/2; rl.position.set(cx,0.013,cz); W_.add(rl);
  const tt=new TH.Mesh(new TH.CylinderGeometry(0.30,0.30,0.04,32),M.marble);tt.position.set(cx,0.42,cz);tt.castShadow=true;tt.receiveShadow=true;W_.add(tt);
  const tb=new TH.Mesh(new TH.CylinderGeometry(0.05,0.07,0.40,20),M.brass);tb.position.set(cx,0.20,cz);tb.castShadow=true;W_.add(tb);
  const ft=new TH.Mesh(new TH.CylinderGeometry(0.18,0.18,0.02,24),M.brass);ft.position.set(cx,0.01,cz);W_.add(ft);
  if(axis==='z'){                            // chairs along the long (z) axis, facing each other over z
    loungeChair(cx,cz-off, 0, W_);           // near chair faces +z
    loungeChair(cx,cz+off, Math.PI, W_);     // far chair faces -z
  }else{                                     // chairs across (x), facing each other over x
    loungeChair(cx-off,cz, Math.PI/2,W_);    // left chair faces +x
    loungeChair(cx+off,cz,-Math.PI/2,W_);    // right chair faces -x
  }
}

let showDims=false, dimGroupRef=null, currentView='מבט כללי';
function roundRect(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
function makeLabel(text){
  const c=document.createElement('canvas');c.width=256;c.height=128;const g=c.getContext('2d');
  g.clearRect(0,0,256,128);
  g.fillStyle='rgba(28,24,20,0.9)';roundRect(g,24,36,208,56,16);g.fill();
  g.strokeStyle='#b08d57';g.lineWidth=4;roundRect(g,24,36,208,56,16);g.stroke();
  g.fillStyle='#f6efe2';g.font='bold 44px Arial';g.textAlign='center';g.textBaseline='middle';
  g.fillText(text,128,66);
  const tex=new TH.CanvasTexture(c);tex.encoding=TH.sRGBEncoding;
  const sp=new TH.Sprite(new TH.SpriteMaterial({map:tex,depthTest:false,transparent:true}));
  sp.scale.set(0.40,0.20,1);sp.renderOrder=1000;return sp;
}
const dimMat=new TH.LineBasicMaterial({color:0x3a2f22,depthTest:false,transparent:true,opacity:0.95});
function dimBar(ax,a,b,fixed,y,text,dg){
  const mk=pts=>{const g=new TH.BufferGeometry().setFromPoints(pts);const l=new TH.Line(g,dimMat);l.renderOrder=999;dg.add(l);};
  mk(ax==='x'?[new TH.Vector3(a,y,fixed),new TH.Vector3(b,y,fixed)]:[new TH.Vector3(fixed,y,a),new TH.Vector3(fixed,y,b)]);
  const tk=0.07;
  if(ax==='x'){mk([new TH.Vector3(a,y,fixed-tk),new TH.Vector3(a,y,fixed+tk)]);mk([new TH.Vector3(b,y,fixed-tk),new TH.Vector3(b,y,fixed+tk)]);}
  else{mk([new TH.Vector3(fixed-tk,y,a),new TH.Vector3(fixed+tk,y,a)]);mk([new TH.Vector3(fixed+tk,y,b),new TH.Vector3(fixed-tk,y,b)]);}
  const lab=makeLabel(text);
  if(ax==='x')lab.position.set((a+b)/2,y+0.13,fixed); else lab.position.set(fixed,y+0.13,(a+b)/2);
  dg.add(lab);
}
function buildDims(opt,dg){

  dg.add(gRoom,gCab,gDesk,gSeat);

  // room
  dimBar('x',0,RW,-0.20,0.03,'3.33',gRoom);
  dimBar('z',0,RD,-0.20,0.03,'2.89',gRoom);
  const dtop=DESK_H+0.04;
  if(opt==='A'){
    dimBar('z',0,2.29,0.45+0.14,0.04,'2.29',gCab);       // cabinet (left wall)
    dimBar('x',0,0.45,2.29+0.16,0.04,'0.45',gCab);
    const bZ=Z(0.70), rZ=Z(1.20);
    dimBar('x',1.53,RW,bZ-0.10,dtop,'1.80',gDesk);   // bottom arm length
    dimBar('z',rZ,RD,2.55,dtop,'1.20',gDesk);        // right arm length
    dimBar('z',bZ,RD,1.44,dtop,'0.70',gDesk);        // desk depth
    dimBar('x',2.29-0.95,2.29+0.95, 0.84-0.75-0.12, 0.02,'1.90',gSeat);
    dimBar('z',0.84-0.75,0.84+0.75, 2.29+0.95+0.12, 0.02,'1.50',gSeat);
  }else if(opt==='D'){
    // cabinet on the FAR wall: length 1.90 (x0.73-2.63), depth 0.50 (z2.39-2.89)
    dimBar('x',0.73,2.63, Z(0.50)-0.12, 0.04,'1.90',gCab);
    dimBar('z',Z(0.50),RD, 0.60, 0.04,'0.50',gCab);
    dimBar('z',0,RD,2.55,dtop,'2.89',gDesk);         // desk length (full wall)
    dimBar('x',RW-0.70,RW,0.42,dtop,'0.70',gDesk);   // desk depth
    // seating square centred (0.95, Z(1.65)=1.24): 1.90 x 1.50
    dimBar('x',0.0,1.90, 1.24-0.75-0.12, 0.02,'1.90',gSeat);
    dimBar('z',1.24-0.75,1.24+0.75, 1.90+0.12, 0.02,'1.50',gSeat);
  }else{
    const D=cabDepth(opt);
    dimBar('z',0,2.29,D+0.14,0.04,'2.29',gCab);       // cabinet (left wall)
    dimBar('x',0,D,2.29+0.16,0.04,D.toFixed(2),gCab);
    dimBar('z',0,RD,2.55,dtop,'2.89',gDesk);         // desk length (full wall)
    dimBar('x',RW-0.70,RW,0.42,dtop,'0.70',gDesk);   // desk depth
    if(opt==='C'){                                   // rotated: 1.50 (x) x 1.90 (z)
      dimBar('x',1.485-0.75,1.485+0.75, 1.395-0.95-0.12, 0.02,'1.50',gSeat);
      dimBar('z',1.395-0.95,1.395+0.95, 1.485-0.75-0.12, 0.02,'1.90',gSeat);
    }else{                                           // B: 1.90 (x) x 1.50 (z)
      dimBar('x',1.485-0.95,1.485+0.95, 1.395-0.75-0.12, 0.02,'1.90',gSeat);
      dimBar('z',1.395-0.75,1.395+0.75, 1.485-0.95-0.12, 0.02,'1.50',gSeat);
    }
  }
}

function clearWorld(){
  world.traverse(o=>{ if(o.geometry)o.geometry.dispose(); });
  scene.remove(world); world=new TH.Group(); scene.add(world);
}
let currentOpt='A';
function build(opt){
  currentOpt=opt; clearWorld();
  buildShell(opt,world); buildDoors(opt,world);
  if(opt==='D'){ buildD(world); }
  else { buildCabinet(opt,world); if(opt==='A') buildA(world); else buildB(world, opt==='C'?'z':'x'); }
  dimGroupRef=new TH.Group(); buildDims(opt,dimGroupRef); world.add(dimGroupRef);
  buildSnapPoints(opt); clearMeasure();
  updateLegend(opt); currentViews=viewsFor(opt); updateDims();
}
// dims are context-aware: overview/top show everything; a detail view shows only its part
function updateDims(){
  if(!dimGroupRef) return;
  const g=dimGroupRef.userData.groups;
  const all = (currentView==='מבט כללי'||currentView==='מבט־על');
  const map={'קיר הארון':'cabinet','שולחן עבודה':'desk','פינת ישיבה':'seating'};
  dimGroupRef.visible=showDims;
  for(const name of ['room','cabinet','desk','seating']){
    g[name].visible = showDims && (all || map[currentView]===name);
  }
}

function updateLegend(opt){
  const L=document.getElementById('legend');
  const desk = opt==='A' ? 'שולחן עבודה בצורת ר (1.80×1.20, עומק 0.70)' :
                           'שולחן עבודה לכל אורך הקיר הימני (עומק 0.70) · 2 עמדות';
  const seat = opt==='A' ? 'פינת ישיבה — 2 כורסאות בוקלה (ליד הכניסה)' :
               opt==='C' ? 'פינת ישיבה — 2 כורסאות בוקלה (מרכז · לאורך)' :
               opt==='D' ? 'פינת ישיבה — 2 כורסאות בוקלה (למעלה-שמאל)' :
                           'פינת ישיבה — 2 כורסאות בוקלה (מרכז · לרוחב)';
  const cab = opt==='D' ? 'ארון "קו אפס" + מדפסת · על הקיר התחתון (עומק 0.50, אורך 1.90)' :
                          'ארון "קו אפס" + מדפסת (עומק '+(opt==='A'?'0.45':'0.50')+')';
  L.innerHTML =
    '<b>אופציה '+opt+'</b> · סגנון מודרני חמים<br>'+
    '<span style="color:#e6b3ad">&#9632;</span> '+cab+' &nbsp; '+
    '<span style="color:#d8a94a">&#9632;</span> '+desk+'<br>'+
    '<span style="color:#e9e1d3">&#9632;</span> '+seat+' &nbsp; '+
    '<span style="color:#7fa8d8">&#9632;</span> דלת כניסה + יציאת מרפסת (שמאל)';
  document.getElementById('sub').textContent='3.33 × 2.89 מ׳ · אופציה '+opt+' · מבט מלמעלה מיושר לתוכנית';
}

// ===== CAMERA =====
const target=new TH.Vector3(RW/2,1.0,RD/2), goalTarget=target.clone();
let radius=6.0,theta=0.0,phi=0.6, gRadius=radius,gTheta=theta,gPhi=phi;
let topActive=false,gTop=false, autoSpin=false;

function applyCam(){
  camera.up.set(0,1,0);
  const st=Math.sin(phi);
  camera.position.set(target.x+radius*st*Math.sin(theta),target.y+radius*Math.cos(phi),target.z+radius*st*Math.cos(theta));
  camera.lookAt(target);
}
function fromEye(eye,tgt){
  const dx=eye[0]-tgt[0],dy=eye[1]-tgt[1],dz=eye[2]-tgt[2],r=Math.hypot(dx,dy,dz);
  gRadius=r; gTheta=Math.atan2(dx,dz); gPhi=Math.acos(Math.min(1,Math.max(-1,dy/r)));
  goalTarget.set(tgt[0],tgt[1],tgt[2]);
}
function exitTop(){
  const dx=camera.position.x-target.x,dy=camera.position.y-target.y,dz=camera.position.z-target.z,r=Math.hypot(dx,dy,dz)||6;
  gRadius=radius=r; gTheta=theta=Math.atan2(dx,dz); gPhi=phi=Math.acos(Math.min(1,Math.max(-1,dy/r)));
  gTop=false;topActive=false;
}
function goView(v){
  if(v.top){gTop=true;gRadius=6.0;goalTarget.set(v.tgt[0],v.tgt[1],v.tgt[2]);}
  else{gTop=false;fromEye(v.eye,v.tgt);}
}
function viewsFor(opt){
  // camera positions dialed in manually by the user via the HUD
  const base={
    "מבט כללי":{eye:[4.60,4.44,4.60],tgt:[1.60,0.77,1.26]},
    "מבט־על":{top:true,tgt:[RW/2,0.3,RD/2]},
  };
  if(opt==='A'){
    base["שולחן עבודה"]={eye:[1.03,2.28,0.37],tgt:[2.76,0.76,2.57]};
    base["פינת ישיבה"]={eye:[2.24,2.08,-0.90],tgt:[2.27,0.41,0.83]};
    base["קיר הארון"]={eye:[3.37,3.10,0.96],tgt:[0.21,1.22,0.95]};
  }else if(opt==='D'){
    base["שולחן עבודה"]={eye:[0.35,2.32,1.45],tgt:[3.05,0.82,1.45]};
    base["פינת ישיבה"]={eye:[2.55,1.75,1.55],tgt:[0.85,0.55,1.24]};
    base["קיר הארון"]={eye:[1.60,1.75,0.45],tgt:[1.68,1.15,2.55]};
  }else{
    base["שולחן עבודה"]={eye:[0.35,2.32,1.45],tgt:[3.05,0.82,1.45]};
    base["פינת ישיבה"]={eye:[1.54,2.02,2.92],tgt:[1.54,0.46,1.44]};
    base["קיר הארון"]={eye:[3.34,3.12,0.91],tgt:[0.20,1.25,0.90]};
  }
  return base;
}
let currentViews=viewsFor('A');

let dragging=false,panning=false,px=0,py=0; const el=renderer.domElement;
function panBy(dx,dy){
  const st=Math.sin(phi),cf=Math.cos(phi);
  const fx=-st*Math.sin(theta),fy=-cf,fz=-st*Math.cos(theta);   // forward (unit)
  let rx=-fz,ry=0,rz=fx; const rl=Math.hypot(rx,rz)||1; rx/=rl;rz/=rl;   // right
  let ux=ry*fz-rz*fy, uy=rz*fx-rx*fz, uz=rx*fy-ry*fx;                     // up = right×forward
  const ul=Math.hypot(ux,uy,uz)||1; ux/=ul;uy/=ul;uz/=ul;
  const s=radius*0.95;
  target.x+=(-dx*rx+dy*ux)*s; target.y+=(-dx*ry+dy*uy)*s; target.z+=(-dx*rz+dy*uz)*s;
  goalTarget.copy(target);
}
// ===== MANUAL MEASURE TOOL =====
let measureMode=false, snapPts=[], measStart=null, previewLine=null;
const measureGroup=new TH.Group(); scene.add(measureGroup);
function buildSnapPoints(opt){
  const P=[]; const add=(x,y,z)=>P.push(new TH.Vector3(x,y,z));
  for(const x of [0,RW]) for(const z of [0,RD]) add(x,0,z);                 // room corners
  if(opt==='D'){
    const t=DESK_H;
    for(const x of [0.73,2.63]) for(const y of [0,RH]) add(x,y,Z(0.50));   // far-wall cabinet front corners
    for(const x of [RW-0.70,RW]) for(const z of [0,RD]) add(x,t,z);        // desk
    for(const x of [0.0,1.90]) for(const z of [1.24-0.75,1.24+0.75]) add(x,0.02,z); // seating rug
  }else{
    const D=cabDepth(opt);
    for(const z of [0,2.29]) for(const y of [0,RH]){ add(0,y,z); add(D,y,z); } // cabinet (left wall)
    if(opt==='A'){
      const bZ=Z(0.70),rZ=Z(1.20),t=DESK_H;
      for(const x of [1.53,RW]) for(const z of [bZ,RD]) add(x,t,z);
      for(const x of [RW-0.70,RW]) for(const z of [rZ,RD]) add(x,t,z);
      for(const x of [2.29-0.95,2.29+0.95]) for(const z of [0.84-0.75,0.84+0.75]) add(x,0.02,z);
    }else{
      const t=DESK_H;
      for(const x of [RW-0.70,RW]) for(const z of [0,RD]) add(x,t,z);
      const rugW=(opt==='C')?0.75:0.95, rugD=(opt==='C')?0.95:0.75;
      for(const x of [1.485-rugW,1.485+rugW]) for(const z of [1.395-rugD,1.395+rugD]) add(x,0.02,z);
    }
  }
  snapPts=P;
}
const ray=new TH.Raycaster(), ndc=new TH.Vector2();
function pickPoint(cx,cy){
  const r=el.getBoundingClientRect();
  ndc.x=((cx-r.left)/r.width)*2-1; ndc.y=-((cy-r.top)/r.height)*2+1;
  ray.setFromCamera(ndc, topActive?orthoCam:camera);
  const hits=ray.intersectObject(world,true); let p=null;
  for(const h of hits){const o=h.object; if(o.type==='Sprite'||o.type==='Line'||o.type==='LineSegments')continue; p=h.point.clone(); break;}
  if(!p) return null;
  let best=null,bd=0.22*0.22;
  for(const s of snapPts){const d=s.distanceToSquared(p); if(d<bd){bd=d;best=s;}}
  return best?best.clone():p;
}
const measLineMat=new TH.LineBasicMaterial({color:0x2f6fd0,depthTest:false,transparent:true});
function measMarker(p){const m=new TH.Mesh(new TH.SphereGeometry(0.028,10,10),new TH.MeshBasicMaterial({color:0x2f6fd0,depthTest:false}));m.position.copy(p);m.renderOrder=1001;measureGroup.add(m);}
function measLabel(text,p){
  const c=document.createElement('canvas');c.width=256;c.height=128;const g=c.getContext('2d');
  g.fillStyle='rgba(20,42,80,0.92)';roundRect(g,18,36,220,56,16);g.fill();
  g.strokeStyle='#7fb0ff';g.lineWidth=4;roundRect(g,18,36,220,56,16);g.stroke();
  g.fillStyle='#eaf2ff';g.font='bold 44px Arial';g.textAlign='center';g.textBaseline='middle';g.fillText(text,128,66);
  const tex=new TH.CanvasTexture(c);tex.encoding=TH.sRGBEncoding;
  const sp=new TH.Sprite(new TH.SpriteMaterial({map:tex,depthTest:false,transparent:true}));
  sp.scale.set(0.42,0.21,1);sp.position.copy(p);sp.position.y+=0.10;sp.renderOrder=1002;measureGroup.add(sp);
}
function addMeasurement(a,b){
  const l=new TH.Line(new TH.BufferGeometry().setFromPoints([a,b]),measLineMat); l.renderOrder=1001; measureGroup.add(l);
  measMarker(a); measMarker(b);
  measLabel(a.distanceTo(b).toFixed(2)+' מ׳', a.clone().add(b).multiplyScalar(0.5));
}
function clearMeasure(){ while(measureGroup.children.length) measureGroup.remove(measureGroup.children[0]); measStart=null; previewLine=null; }
function measureClick(cx,cy){
  const p=pickPoint(cx,cy); if(!p) return;
  if(!measStart){ measStart=p; measMarker(p); }
  else { if(previewLine){measureGroup.remove(previewLine);previewLine=null;} addMeasurement(measStart,p); measStart=null; }
}
function measurePreview(cx,cy){
  const p=pickPoint(cx,cy); if(!p) return;
  if(previewLine) measureGroup.remove(previewLine);
  previewLine=new TH.Line(new TH.BufferGeometry().setFromPoints([measStart,p]),
    new TH.LineBasicMaterial({color:0x7fb0ff,depthTest:false,transparent:true,opacity:0.85}));
  previewLine.renderOrder=1000; measureGroup.add(previewLine);
}
const HINT=document.querySelector('.hint'), HINT_DEF=HINT.textContent;
document.getElementById('measure').onclick=()=>{
  measureMode=!measureMode;
  document.getElementById('measure').classList.toggle('on',measureMode);
  el.style.cursor=measureMode?'crosshair':'';
  HINT.textContent=measureMode?'מצב מדידה: לחיצה = נקודה · שתי נקודות = קו עם אורך · גרירה = סיבוב · לחיצה חוזרת על 📏 מנקה':HINT_DEF;
  if(!measureMode) clearMeasure();
};
el.addEventListener('contextmenu',e=>e.preventDefault());
let downX=0,downY=0,moved=false;
el.addEventListener('pointerdown',e=>{if(gTop||topActive)exitTop();dragging=true;panning=(e.button===2||e.shiftKey);px=e.clientX;py=e.clientY;downX=e.clientX;downY=e.clientY;moved=false;el.setPointerCapture(e.pointerId);autoSpin=false;setSpinBtn();});
el.addEventListener('pointerup',e=>{const wasDrag=moved;dragging=false;
  if(measureMode&&!wasDrag&&!panning) measureClick(e.clientX,e.clientY);
  panning=false;});
el.addEventListener('pointermove',e=>{
  if(Math.abs(e.clientX-downX)+Math.abs(e.clientY-downY)>6) moved=true;
  if(dragging){const dx=(e.clientX-px)/innerWidth,dy=(e.clientY-py)/innerHeight;px=e.clientX;py=e.clientY;
    if(panning){panBy(dx,dy);} else {gTheta-=dx*3.2;gPhi-=dy*2.2;gPhi=Math.max(0.12,Math.min(Math.PI*0.49,gPhi));}}
  else if(measureMode&&measStart){ measurePreview(e.clientX,e.clientY); }});
el.addEventListener('wheel',e=>{e.preventDefault();gRadius*=(1+Math.sign(e.deltaY)*0.08);gRadius=Math.max(1.6,Math.min(12,gRadius));},{passive:false});
let pinch=0;
el.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();if(gTop||topActive)exitTop();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);if(pinch){gRadius*=pinch/d;gRadius=Math.max(1.6,Math.min(12,gRadius));}pinch=d;}},{passive:false});
el.addEventListener('touchend',()=>pinch=0);

const vbox=document.getElementById('views');
["מבט כללי","מבט־על","שולחן עבודה","פינת ישיבה","קיר הארון"].forEach((k,i)=>{
  const b=document.createElement('button');b.className='v';b.textContent=k;b.dataset.k=k;
  b.onclick=()=>{document.querySelectorAll('button.v').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    goView(currentViews[k]);autoSpin=false;setSpinBtn();showRef(currentOpt,k);currentView=k;updateDims();};
  vbox.appendChild(b); if(i===0)b.classList.add('on');
});
document.querySelectorAll('button.o').forEach(b=>{
  b.onclick=()=>{document.querySelectorAll('button.o').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    build(b.dataset.opt);
    const sel=document.querySelector('button.v.on'); const k=sel?sel.dataset.k:"מבט כללי"; goView(currentViews[k]);showRef(currentOpt,k);currentView=k;updateDims();};
});
const spinBtn=document.getElementById('spin');
function setSpinBtn(){spinBtn.classList.toggle('on',autoSpin);}
spinBtn.onclick=()=>{if(gTop||topActive)exitTop();autoSpin=!autoSpin;if(autoSpin){goalTarget.set(RW/2,1.0,RD/2);}setSpinBtn();};
document.getElementById('dims').onclick=()=>{showDims=!showDims;updateDims();
  document.getElementById('dims').classList.toggle('on',showDims);};
document.getElementById('shot').onclick=()=>{const cam=topActive?orthoCam:camera;renderer.render(scene,cam);
  const a=document.createElement('a');a.download='room_'+currentOpt+'_'+Date.now()+'.png';a.href=renderer.domElement.toDataURL('image/png');a.click();};

// reference-image panel (shows the matching uploaded render for the current view)
const REF=window.REFDATA||{};
const refPanel=document.getElementById('refpanel'),refThumb=document.getElementById('refthumb'),
      refCap=document.getElementById('refcap'),refModal=document.getElementById('refmodal'),refBig=document.getElementById('refbig');
function showRef(opt,view){
  const data=REF[(opt==='C'?'B':opt)+'|'+view];
  if(data){refThumb.src=data;refBig.src=data;refCap.textContent='📷 רפרנס · '+view;refPanel.classList.add('show');}
  else{refPanel.classList.remove('show');}
}
refThumb.onclick=()=>{if(refBig.getAttribute('src'))refModal.classList.add('show');};
refModal.onclick=()=>refModal.classList.remove('show');

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);fitOrtho();});
function fitOrtho(){
  const aspect=innerWidth/innerHeight, minEx=(RW+0.9)/2, minEz=(RD+0.9)/2;
  let ez=minEz, ex=ez*aspect; if(ex<minEx){ex=minEx;ez=ex/aspect;}
  orthoCam.left=-ex;orthoCam.right=ex;orthoCam.top=ez;orthoCam.bottom=-ez;
  orthoCam.position.set(target.x,10,target.z);orthoCam.up.set(0,0,-1);orthoCam.lookAt(target.x,0,target.z);
  orthoCam.updateProjectionMatrix();
}

// ===== INIT =====
build('A'); goView(currentViews["מבט כללי"]); showRef('A','מבט כללי');
function lerp(a,b,t){return a+(b-a)*t;}
function tick(){
  requestAnimationFrame(tick);
  topActive=gTop;
  if(!topActive&&autoSpin)gTheta+=0.0022;
  radius=lerp(radius,gRadius,0.12);
  target.lerp(goalTarget,0.12);
  if(topActive){fitOrtho();renderer.render(scene,orthoCam);}
  else{theta=lerp(theta,gTheta,0.12);phi=lerp(phi,gPhi,0.12);applyCam();renderer.render(scene,camera);}
}
document.getElementById('loading').style.display='none';
tick();
})();
</script>
</body>
